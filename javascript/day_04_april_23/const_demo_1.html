<script>
    const arr = [10, 20];
    arr.push(30);   // add new data allowed
    delete arr[1];  // delete item allowed
    arr[0] = 15;    // update value allowed
    console.log(arr); // [15, undefined, 30]

    // arr = []; // not allowed - Assignment to constant variable.


    let user = { name: 'sanjay', role: 'trainer' };
    user.add = 'bangalore'; // add new property - allowed
    delete user.role; // delete property - allowed
    user.name = 'sanjay kumar'; // update value - allowed
    console.log(user);

    user = {};  // this is not allowed
</script>
