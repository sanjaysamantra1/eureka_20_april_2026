<script>
    console.log(`a is: ${a}`);  // undefined ( Hoisting )
    // console.log(`b is: ${b}`);  // Cannot access 'b' before initialization
    // console.log(`c is: ${c}`);  // Cannot access 'b' before initialization
    var a = 10;
    let b = 20;
    const c = 30;
    console.log(`a is: ${a}`); // 10
    console.log(`b is: ${b}`); // 20
    console.log(`c is: ${c}`); // 30
</script>
