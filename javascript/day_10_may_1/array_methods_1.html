<script>
    let cars = ['Tata', 'Honda', 'Maruti'];

    console.log('Cars Before Push: ', cars); // ['Tata', 'Honda', 'Maruti'];
    cars.push('Hyundai');
    console.log('Cars After Push: ', cars); // ['Tata', 'Honda', 'Maruti', 'Hyundai'];
    cars.pop();
    console.log('Cars After pop: ', cars); // ['Tata', 'Honda', 'Maruti'];
    cars.unshift('Hyundai');
    console.log('Cars After unshift: ', cars); // ['Hyundai', 'Tata', 'Honda', 'Maruti'];
    cars.shift();
    console.log('Cars After shift: ', cars); // ['Tata', 'Honda', 'Maruti'];
</script>
