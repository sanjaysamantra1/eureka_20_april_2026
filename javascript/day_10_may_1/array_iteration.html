<script>
    let cars = ['Tata', 'Honda', 'Maruti', 'Hyundai'];

    // 1. loop
    for (let i = 0; i < cars.length; i++) {
        console.log(cars[i]);
    }
    console.log("==============")

    // 2. for-in   ES_6   2015
    for (let i in cars) {   // i = 0/1/2/3
        console.log(i, cars[i])
    }
    console.log("==============")

    // 3. for-of
    for (car of cars) {
        console.log(car)
    }
    console.log("==============")

    // 4. forEach
    cars.forEach((val, ind, arr) => {
        console.log(val, ind, arr)
    })
</script>
