<script>
    let cars = ['Tata', 'Honda', 'Maruti', 'Hyundai', 'Maruti'];

    console.log(cars.at(1)); // Honda
    console.log(cars[1]); // Honda

    console.log(cars.indexOf('Maruti')); // 2
    console.log(cars.lastIndexOf('Maruti')); // 2

    console.log(cars.includes('Maruti')); // true
    console.log(cars.includes('Toyota')); // false
</script>
