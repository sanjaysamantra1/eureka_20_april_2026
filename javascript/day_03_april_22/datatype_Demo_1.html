<script>
    let a = 5;
    console.log(a, typeof a); // 5   number

    let b = 5.4;
    console.log(b, typeof b); // number

    let c = 8.11111111;
    console.log(c, typeof c); // number

    let d = 'virat';
    console.log(d, typeof d); // string

    let e = '10';
    console.log(e, typeof e); // string 

    let f = true;
    console.log(f, typeof f); //boolean

    let g = 'false'
    console.log(g, typeof g); // string

    let h = [];
    console.log(h, typeof h); // object

    let i = {};
    console.log(i, typeof i); // object

    let j = NaN;
    console.log(j, typeof j); // Number
</script>
