<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Let's Learn Document Object</h1>
    <h2></h2>
    <div id="myDiv">This is a Div</div>

    <script>
        let msg = 'Hellooo, Good Morning!!!';
        document.write(msg);

        // change the color of the element whose id=myDiv 
        document.getElementById('myDiv').style.color = 'red';

        // change the color of h1
        document.querySelector('h1').style.color = 'purple';

        // add text 'Welcome to Document' in h2
        document.querySelector('h2').innerText = 'WelCome to Document Object'
    </script>
</body>

</html>
