<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 {
            color: red;
        }
    </style>
</head>

<body>
    <h1 class="text-center">Product List</h1>
    <hr />

    <div class="container">
        <div class="row">

        </div>
    </div>

    <script>
        async function fetchProducts() {
            let response = await fetch('https://fakestoreapi.com/products');
            let productsArr = await response.json();
            console.log(productsArr);

            let row = document.querySelector('.row');

            productsArr.forEach(product => {
                let card = `
                <div class="col-md-3 mb-4 text-center">
                    <div class="card h-100 shadow">
                        <img src="${product.image}" class="card-img-top" style="height:200px; object-fit:contain;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${product.category}</h5>
                            <p class="card-text"> ${product.id}</p>
                            <p class="card-text text-truncate"> ${product.title}</p>
                            <p class="card-text text-truncate"> ${product.description}</p>
                            <p class="card-text">₹ ${product.price}</p>
                            <button class="btn btn-primary mt-auto">Buy Now</button>
                        </div>
                    </div>
                </div>
            `;
                row.innerHTML += card;
            });
        }
        fetchProducts()
    </script>
</body>

</html>
