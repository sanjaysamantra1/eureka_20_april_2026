<script>
    const romanMap = {
        M: 1000, CM: 900, D: 500, CD: 400, C: 100,
        XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1
    };
    function numberToRoman(num) {
        let romanStr = '';

        for (key in romanMap) {
            let value = romanMap[key];
            while (num >= value) {
                romanStr = romanStr + key;
                num = num - value;
            }
        }
        return romanStr;
    }
    console.log(numberToRoman(12)); //XII
</script>
