<script>
    class Student {
        firstName = 'Virat';
        lastName = 'Kohli';

        fullName1() {
            console.log('fullname-1: ', this); // this = student 
            console.log(this.firstName, this.lastName);
        }
        fullName2 = () => {
            console.log('fullname-2: ', this); // this = student 
            console.log(this.firstName, this.lastName);
        }
    }
    let stdObj = new Student();
    stdObj.fullName1();   // this = Student
    stdObj.fullName2();   // this = Student

    setTimeout(stdObj.fullName1, 4000);  // this = window
    setTimeout(stdObj.fullName2, 8000);  // this = student
</script>
