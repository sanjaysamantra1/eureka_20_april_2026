<script>
    let str = 'this is javascript class';

    console.log(str.includes('java')); // true
    console.log(str.includes('python')); // true

    console.log(str.startsWith('this')); // true
    console.log(str.endsWith('this')); // false

    console.log(str.startsWith('class')); // false
    console.log(str.endsWith('class')); // true
</script>
