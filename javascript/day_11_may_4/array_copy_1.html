<script>
    let arr1 = [10, 20];
    let arr2 = arr1;  // address/reference copy
    // a new array is not being created, there is 1 array bot arr1 and arr2 refers to the same array
    arr1.push(30)
    arr2.push(40);
    console.log('arr1: ', arr1); // [10, 20, 30, 40]
    console.log('arr2: ', arr2); // [10, 20, 30, 40]


    let arr3 = [10, 20, [30, 31]];
    let arr4 = [...arr3]; // value copy - shallow copy - spread operator
    arr4.push(40, 50);
    arr4[2].push(32, 33);
    console.log('arr3: ', arr3); // [10, 20, [30, 31,32,33]]
    console.log('arr4: ', arr4); // [10, 20, [30, 31],40,50]


    let arr5 = [10, 20, [30, 31]];
    let arr6 = structuredClone(arr5); // value copy - deep copy - structuredClone
    arr6.push(40, 50);
    arr6[2].push(32, 33);
    console.log('arr5: ', arr5); // [10, 20, [30, 31]]
    console.log('arr6: ', arr6); // [10, 20, [30, 31],40,50]
</script>
